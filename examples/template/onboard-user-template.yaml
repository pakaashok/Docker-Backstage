apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboarding-tile-v1 # Strictly unique name
  title: Onboard GitHub User
  description: Separate tile for inviting users and updating CODEOWNERS
  tags:
    - admin
spec:
  owner: user:pakaashok
  type: service

  parameters:
    - title: Onboarding Details
      required: [githubUser, repoName]
      properties:
        githubUser:
          type: string
          title: GitHub Username
        repoName:
          type: string
          title: New Repository Name

  steps:
    - id: fetch-onboarding
      name: Prepare Onboarding Skeleton
      action: fetch:template
      input:
        url: ./onboarding-skeleton # This must be a separate folder
        values:
          githubUser: ${{ parameters.githubUser }}

    - id: publish-onboarding
      name: Initialize Onboarding Repo
      action: publish:github
      input:
        allowedHosts: ['github.com']
        repoUrl: 'github.com?owner=pakaashok&repo=${{ parameters.repoName }}'
        defaultBranch: main