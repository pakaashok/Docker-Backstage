app:
  # The user will provide this in .env (e.g., http://192.168.1.50:7007)
  baseUrl: ${BASE_URL}

organization:
  name: ${ORG_NAME}

backend:
  baseUrl: ${BASE_URL}
  listen:
    port: 7007
    host: 0.0.0.0
  csp:
    connect-src: ["'self'", "http:", "https:"]
  cors:
    origin: ${BASE_URL}
  
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: 5432
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

auth:
  environment: production
  providers:
    guest: 
      dangerouslyAllowEveryone: true
