app:
  title: Acube Farms Platform
  baseUrl: http://localhost:3000

organization:
  name: Acube Farms & Holdings

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
    host: 0.0.0.0  # ✅ REQUIRED for Raspberry Pi access
  csp:
    connect-src: ["'self'", "http:", "https:"]
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  database:
    client: better-sqlite3
    connection:
      directory: ./backstage-data

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

proxy: {}

techdocs:
  builder: local
  generator:
    runIn: docker
  publisher:
    type: local

auth:
  environment: development
  providers:
    guest:
      dangerouslyAllowEveryone: true

scaffolder: {}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration

  rules:
    - allow: [Component, System, API, Resource, Location, Template, User, Group]

  locations:
    # ✅ FIXED: Now using relative paths that work inside Docker container
    - type: file
      target: ./examples/entities.yaml

    - type: file
      target: ./examples/template/template.yaml

    - type: file
      target: ./examples/template/onboard-user-template.yaml

    - type: file
      target: ./examples/org.yaml

permission:
  enabled: false
